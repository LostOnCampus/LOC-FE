server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API 요청은 백엔드로 전달 (리버스 프록시)
    location /api/ {
        proxy_pass http://101.79.29.169:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 나머지는 SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}